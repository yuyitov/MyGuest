<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>MyGuest — Core Promise</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--ivory); }

    .canvas {
      justify-content: space-between;
      padding: 72px 80px;
    }

    /* Subtle texture lines */
    .bg-lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-line {
      position: absolute;
      background: var(--taupe);
      opacity: 0.3;
    }

    .bg-line.h { height: 1px; width: 100%; }
    .bg-line.v { width: 1px; height: 100%; }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .post-label {
      font-size: 18px;
      color: var(--warm-gray);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Center block */
    .center-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .quote-mark {
      font-size: 220px;
      line-height: 0.75;
      color: var(--teal);
      font-family: Georgia, 'Times New Roman', serif;
      opacity: 0.18;
      display: block;
      margin-bottom: 0;
      user-select: none;
    }

    .promise-text {
      font-size: 82px;
      font-weight: 500;
      color: var(--charcoal);
      line-height: 1.08;
      letter-spacing: -0.025em;
      max-width: 860px;
      margin-top: -48px;
      position: relative;
      z-index: 2;
    }

    .promise-text em {
      font-style: normal;
      color: var(--deep-teal);
    }

    .accent-line-center {
      width: 40px;
      height: 3px;
      background: var(--teal);
      border-radius: 2px;
      margin: 36px auto 28px;
    }

    .promise-sub {
      font-size: 26px;
      color: var(--warm-gray);
      font-weight: 400;
      line-height: 1.5;
      max-width: 560px;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
<div class="canvas" id="canvas">
  <!-- Subtle bg lines -->
  <div class="bg-lines">
    <div class="bg-line h" style="top: 33.3%"></div>
    <div class="bg-line h" style="top: 66.6%"></div>
    <div class="bg-line v" style="left: 33.3%"></div>
    <div class="bg-line v" style="left: 66.6%"></div>
  </div>

  <!-- Top bar -->
  <div class="top-bar">
    <span class="post-label">What we believe</span>
    <img class="logo" id="logo" src="../../public/landing/logo_principal-Photoroom.png" alt="MyGuest">
  </div>

  <!-- Center promise -->
  <div class="center-block">
    <span class="quote-mark">"</span>
    <h1 class="promise-text" id="headline">Everything your guests need, right on their phone.</h1>
    <div class="accent-line-center"></div>
    <p class="promise-sub" id="subtitle">No app downloads. No lost PDFs. Just one clean link that works.</p>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <img class="logo-sm" src="../../public/landing/logo_principal-Photoroom.png" alt="MyGuest">
    <span class="site-url">myguestguide.com</span>
  </div>
</div>

<script>
(function() {
  const data = window.POST_DATA || null;
  if (!data) {
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('postId');
    if (postId) {
      fetch('../posts.json')
        .then(r => r.json())
        .then(posts => {
          const p = posts.find(x => x.id === postId);
          if (p) applyData(p);
        }).catch(() => {});
    }
    return;
  }
  applyData(data);

  function applyData(p) {
    if (p.title) document.getElementById('headline').textContent = p.title;
    if (p.subtitle) document.getElementById('subtitle').textContent = p.subtitle;
  }
})();
</script>
</body>
</html>
