<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>MyGuest — Host Problem</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--ivory); }

    .canvas {
      padding: 72px 80px;
      justify-content: space-between;
      background: var(--ivory);
    }

    /* Subtle warm texture */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 500px at 50% 120%, #F0E8DE 0%, transparent 70%);
      pointer-events: none;
    }

    /* Top */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    /* Center pain block */
    .pain-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
      padding: 20px 0;
    }

    .sound-familiar {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FDF0EA;
      border: 1px solid var(--coral);
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 20px;
      font-weight: 500;
      color: #C96A4A;
      margin-bottom: 40px;
      letter-spacing: 0.01em;
    }

    .sound-familiar::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--coral);
      display: inline-block;
    }

    .pain-headline {
      font-size: 78px;
      font-weight: 500;
      color: var(--charcoal);
      line-height: 1.08;
      letter-spacing: -0.025em;
      max-width: 900px;
      margin-bottom: 36px;
    }

    .pain-headline em {
      font-style: normal;
      color: var(--coral);
    }

    .accent-line-coral {
      width: 48px;
      height: 3px;
      background: var(--coral);
      border-radius: 2px;
      margin-bottom: 36px;
    }

    .pain-body {
      font-size: 28px;
      color: var(--warm-gray);
      line-height: 1.55;
      max-width: 720px;
      font-weight: 400;
    }

    /* Bottom better-way bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
      padding-top: 32px;
      border-top: 1px solid var(--taupe);
    }

    .better-way {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      color: var(--deep-teal);
      font-weight: 500;
    }

    .better-way::before {
      content: '';
      width: 24px;
      height: 2px;
      background: var(--teal);
      border-radius: 2px;
    }
  </style>
</head>
<body>
<div class="canvas" id="canvas">
  <!-- Top nav -->
  <div class="top-nav">
    <img class="logo" id="logo" src="../../public/landing/logo_principal-Photoroom.png" alt="MyGuest">
    <span class="site-url">myguestguide.com</span>
  </div>

  <!-- Pain block -->
  <div class="pain-block">
    <div class="sound-familiar" id="tag">Sound familiar?</div>
    <h1 class="pain-headline" id="headline">Your guests are messaging you at <em>11pm.</em> Again.</h1>
    <div class="accent-line-coral"></div>
    <p class="pain-body" id="body">Check-in questions. WiFi passwords. Where's the nearest pharmacy? You've answered all of these dozens of times — and so you will with the next guest.</p>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <img class="logo-sm" src="../../public/landing/logo_principal-Photoroom.png" alt="MyGuest">
    <div class="better-way">There's a better way.</div>
  </div>
</div>

<script>
(function() {
  const data = window.POST_DATA || null;
  if (!data) {
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('postId');
    if (postId) {
      fetch('../posts.json')
        .then(r => r.json())
        .then(posts => {
          const p = posts.find(x => x.id === postId);
          if (p) applyData(p);
        }).catch(() => {});
    }
    return;
  }
  applyData(data);

  function applyData(p) {
    if (p.title) document.getElementById('headline').innerHTML = p.title;
    if (p.body) document.getElementById('body').textContent = p.body;
    if (p.tag) document.getElementById('tag').textContent = p.tag;
  }
})();
</script>
</body>
</html>
