<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>MyGuest — Brand Intro</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--ivory); }

    .canvas {
      justify-content: space-between;
    }

    /* Decorative background shape */
    .bg-circle {
      position: absolute;
      width: 680px;
      height: 680px;
      border-radius: 50%;
      background: radial-gradient(circle, #E8F7F7 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.55;
      pointer-events: none;
    }

    .bg-arc {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid var(--taupe);
      top: -100px;
      right: -80px;
      opacity: 0.5;
    }

    .bg-arc-2 {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 1px solid var(--taupe);
      bottom: 120px;
      left: -60px;
      opacity: 0.4;
    }

    /* Top nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    /* Center content */
    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 40px 0;
    }

    .intro-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--sand);
      border: 1px solid var(--taupe);
      border-radius: 999px;
      padding: 9px 22px;
      font-size: 20px;
      font-weight: 500;
      color: var(--warm-gray);
      letter-spacing: 0.02em;
      margin-bottom: 36px;
    }

    .intro-tag::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      display: inline-block;
    }

    .headline {
      font-size: 76px;
      font-weight: 500;
      color: var(--charcoal);
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 820px;
    }

    .headline em {
      font-style: normal;
      color: var(--deep-teal);
    }

    .accent-line-center {
      width: 48px;
      height: 3px;
      background: var(--teal);
      border-radius: 2px;
      margin: 32px auto;
    }

    .subtitle {
      font-size: 30px;
      font-weight: 400;
      color: var(--warm-gray);
      line-height: 1.5;
      max-width: 640px;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .bottom-url {
      font-size: 22px;
      color: var(--warm-gray);
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .bottom-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--deep-teal);
      color: white;
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .bottom-cta::after {
      content: '→';
      font-size: 18px;
    }
  </style>
</head>
<body>
<div class="canvas" id="canvas">
  <!-- Decorative backgrounds -->
  <div class="bg-circle"></div>
  <div class="bg-arc"></div>
  <div class="bg-arc-2"></div>

  <!-- Top nav -->
  <div class="top-nav">
    <img class="logo" id="logo" src="../../public/landing/logo_principal-Photoroom.png" alt="MyGuest">
    <span class="site-url">myguestguide.com</span>
  </div>

  <!-- Center content -->
  <div class="center-content">
    <div class="intro-tag" id="tag">Digital Welcome Book</div>
    <h1 class="headline" id="headline">The digital welcome book your guests will actually use.</h1>
    <div class="accent-line-center"></div>
    <p class="subtitle" id="subtitle">Mobile guide + printable PDF. Everything in one link. In 3 languages.</p>
  </div>

  <!-- Bottom -->
  <div class="bottom-bar">
    <span class="bottom-url">myguestguide.com</span>
    <div class="bottom-cta" id="cta">View demo</div>
  </div>
</div>

<script>
(function() {
  const data = window.POST_DATA || null;
  if (!data) {
    // Try URL param
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('postId');
    if (postId) {
      fetch('../posts.json')
        .then(r => r.json())
        .then(posts => {
          const p = posts.find(x => x.id === postId);
          if (p) applyData(p);
        })
        .catch(() => {});
    }
    return;
  }
  applyData(data);

  function applyData(p) {
    if (p.title) document.getElementById('headline').textContent = p.title;
    if (p.subtitle) document.getElementById('subtitle').textContent = p.subtitle;
    if (p.cta) document.getElementById('cta').textContent = p.cta + ' →';
    if (p.tag) document.getElementById('tag').textContent = p.tag;
  }
})();
</script>
</body>
</html>
