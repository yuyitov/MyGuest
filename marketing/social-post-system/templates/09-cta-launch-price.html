<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>MyGuest — CTA / Launch Price</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--ivory); }

    .canvas {
      padding: 72px 80px;
      justify-content: space-between;
      align-items: center;
      text-align: center;
    }

    /* Radiating circles decoration */
    .bg-rings {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--taupe);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .ring-1 { width: 320px; height: 320px; opacity: 0.6; }
    .ring-2 { width: 520px; height: 520px; opacity: 0.4; }
    .ring-3 { width: 720px; height: 720px; opacity: 0.25; }
    .ring-4 { width: 960px; height: 960px; opacity: 0.12; }

    .glow-center {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, #E8F7F7 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Top nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    /* Center price block */
    .price-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      flex: 1;
      justify-content: center;
    }

    .launch-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #E8F7F7;
      border: 1px solid var(--teal);
      border-radius: 999px;
      padding: 8px 20px;
      font-size: 20px;
      font-weight: 500;
      color: var(--deep-teal);
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .launch-tag::before {
      content: '✦';
      font-size: 12px;
      color: var(--teal);
    }

    .price-number {
      font-size: 180px;
      font-weight: 500;
      color: var(--deep-teal);
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 0;
    }

    .price-currency {
      font-size: 72px;
      font-weight: 400;
      color: var(--teal);
      vertical-align: super;
      line-height: 1;
      margin-right: 4px;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .price-once {
      font-size: 22px;
      color: var(--warm-gray);
      font-weight: 400;
      margin-top: 8px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .accent-line-center {
      width: 40px;
      height: 3px;
      background: var(--teal);
      border-radius: 2px;
      margin: 28px auto 24px;
    }

    .price-tagline {
      font-size: 36px;
      font-weight: 500;
      color: var(--charcoal);
      line-height: 1.25;
      letter-spacing: -0.01em;
      margin-bottom: 36px;
      max-width: 680px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--deep-teal);
      color: white;
      border-radius: 999px;
      padding: 18px 44px;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.01em;
      box-shadow: 0 8px 32px rgba(45,106,115,0.25);
    }

    .cta-btn::after { content: '→'; font-size: 22px; }

    /* Bottom */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .no-sub {
      font-size: 18px;
      color: var(--warm-gray);
      font-weight: 400;
    }
  </style>
</head>
<body>
<div class="canvas" id="canvas">
  <!-- Decorative rings -->
  <div class="bg-rings">
    <div class="glow-center"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ring ring-4"></div>
  </div>

  <!-- Top nav -->
  <div class="top-nav">
    <img class="logo" src="../../public/landing/logo_principal-Photoroom.png" alt="MyGuest">
    <span class="site-url">myguestguide.com</span>
  </div>

  <!-- Price block -->
  <div class="price-block">
    <div class="launch-tag" id="launchTag">Launch price</div>

    <div class="price-row">
      <span class="price-currency">$</span>
      <span class="price-number" id="priceNum">29</span>
    </div>
    <div class="price-once">one-time payment</div>

    <div class="accent-line-center"></div>

    <h2 class="price-tagline" id="headline">Your digital welcome book, ready to share.</h2>
    <div class="cta-btn" id="cta">Get your guide</div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <span class="no-sub">No subscription. No renewal.</span>
    <span class="site-url">myguestguide.com</span>
  </div>
</div>

<script>
(function() {
  const data = window.POST_DATA || null;
  if (!data) {
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('postId');
    if (postId) {
      fetch('../posts.json')
        .then(r => r.json())
        .then(posts => {
          const p = posts.find(x => x.id === postId);
          if (p) applyData(p);
        }).catch(() => {});
    }
    return;
  }
  applyData(data);

  function applyData(p) {
    if (p.title) document.getElementById('headline').textContent = p.title;
    if (p.cta) document.getElementById('cta').textContent = p.cta + ' →';
    if (p.price) document.getElementById('priceNum').textContent = p.price;
    if (p.tag) document.getElementById('launchTag').textContent = p.tag;
  }
})();
</script>
</body>
</html>
