<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>MyGuest — What's Included</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--ivory); }

    .canvas {
      padding: 72px 80px;
      justify-content: flex-start;
    }

    /* Decorative large numeral in background */
    .bg-numeral {
      position: absolute;
      right: -20px;
      bottom: 60px;
      font-size: 420px;
      font-weight: 600;
      color: var(--sand);
      line-height: 1;
      pointer-events: none;
      user-select: none;
      letter-spacing: -0.05em;
    }

    /* Top nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 56px;
      position: relative;
      z-index: 2;
    }

    /* Section header */
    .section-header {
      margin-bottom: 48px;
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      font-size: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      font-weight: 500;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 66px;
      font-weight: 500;
      color: var(--charcoal);
      line-height: 1.05;
      letter-spacing: -0.025em;
    }

    .accent-line {
      width: 48px;
      height: 3px;
      background: var(--teal);
      border-radius: 2px;
      margin-top: 24px;
    }

    /* Checklist */
    .checklist {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      z-index: 2;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 22px 0;
      border-bottom: 1px solid var(--taupe);
    }

    .check-item:last-child {
      border-bottom: none;
    }

    .check-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #E8F7F7;
      border: 1.5px solid var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--deep-teal);
      font-size: 15px;
      font-weight: 600;
    }

    .check-label {
      font-size: 28px;
      font-weight: 500;
      color: var(--charcoal);
      flex: 1;
      letter-spacing: -0.005em;
    }

    .check-badge {
      font-size: 17px;
      color: var(--warm-gray);
      background: var(--sand);
      border: 1px solid var(--taupe);
      border-radius: 999px;
      padding: 5px 14px;
      font-weight: 400;
      white-space: nowrap;
    }

    .check-badge.teal {
      background: #E8F7F7;
      border-color: var(--teal);
      color: var(--deep-teal);
    }

    /* Bottom */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 24px;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
<div class="canvas" id="canvas">
  <div class="bg-numeral">7</div>

  <!-- Top nav -->
  <div class="top-nav">
    <img class="logo" src="../../public/landing/logo_principal-Photoroom.png" alt="MyGuest">
    <span class="site-url">myguestguide.com</span>
  </div>

  <!-- Section header -->
  <div class="section-header">
    <div class="eyebrow">Everything included</div>
    <h1 class="section-title" id="headline">What's included.</h1>
    <div class="accent-line"></div>
  </div>

  <!-- Checklist -->
  <div class="checklist" id="checklist">
    <div class="check-item">
      <div class="check-circle">✓</div>
      <span class="check-label">Mobile welcome guide</span>
      <span class="check-badge teal">Works on any phone</span>
    </div>
    <div class="check-item">
      <div class="check-circle">✓</div>
      <span class="check-label">Printable PDF</span>
      <span class="check-badge">Leave it on the table</span>
    </div>
    <div class="check-item">
      <div class="check-circle">✓</div>
      <span class="check-label">3 languages</span>
      <span class="check-badge teal">EN · ES · FR</span>
    </div>
    <div class="check-item">
      <div class="check-circle">✓</div>
      <span class="check-label">Check-in details</span>
      <span class="check-badge">Code, parking, access</span>
    </div>
    <div class="check-item">
      <div class="check-circle">✓</div>
      <span class="check-label">House rules &amp; local tips</span>
    </div>
    <div class="check-item">
      <div class="check-circle">✓</div>
      <span class="check-label">Emergency &amp; contact info</span>
    </div>
    <div class="check-item">
      <div class="check-circle">✓</div>
      <span class="check-label">Your style, your brand</span>
      <span class="check-badge teal">4 designs</span>
    </div>
  </div>
</div>

<script>
(function() {
  const data = window.POST_DATA || null;
  if (!data) {
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('postId');
    if (postId) {
      fetch('../posts.json')
        .then(r => r.json())
        .then(posts => {
          const p = posts.find(x => x.id === postId);
          if (p) applyData(p);
        }).catch(() => {});
    }
    return;
  }
  applyData(data);

  function applyData(p) {
    if (p.title) document.getElementById('headline').textContent = p.title;
  }
})();
</script>
</body>
</html>
