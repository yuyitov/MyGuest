<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>MyGuest — Solution</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { background: var(--deep-teal); }

    .canvas {
      background: var(--deep-teal);
      padding: 72px 80px;
      justify-content: space-between;
    }

    /* Decorative bg elements */
    .canvas::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      top: -200px;
      right: -200px;
      pointer-events: none;
    }

    .canvas::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
      bottom: -150px;
      left: -150px;
      pointer-events: none;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(89,195,195,0.15) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Top nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    /* Main content */
    .solution-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
      padding: 20px 0;
    }

    .solution-eyebrow {
      font-size: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(89, 195, 195, 0.9);
      font-weight: 500;
      margin-bottom: 28px;
    }

    .solution-headline {
      font-size: 86px;
      font-weight: 500;
      color: white;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 44px;
      max-width: 820px;
    }

    .accent-line-teal {
      width: 48px;
      height: 3px;
      background: var(--teal);
      border-radius: 2px;
      margin-bottom: 44px;
    }

    /* Benefit list */
    .benefit-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .benefit-item {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .benefit-check {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(89,195,195,0.2);
      border: 1.5px solid var(--teal);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--teal);
      font-size: 16px;
    }

    .benefit-text {
      font-size: 30px;
      font-weight: 400;
      color: rgba(255,255,255,0.88);
      line-height: 1.35;
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .cta-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--teal);
      color: var(--deep-teal);
      border-radius: 999px;
      padding: 12px 28px;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
<div class="canvas" id="canvas">
  <div class="glow"></div>

  <!-- Top nav -->
  <div class="top-nav">
    <img class="logo-white" id="logo" src="../../public/landing/logo_principal-Photoroom.png" alt="MyGuest">
    <span class="site-url white">myguestguide.com</span>
  </div>

  <!-- Solution block -->
  <div class="solution-block">
    <div class="solution-eyebrow">The MyGuest way</div>
    <h1 class="solution-headline" id="headline">One link. Everything they need.</h1>
    <div class="accent-line-teal"></div>
    <div class="benefit-list" id="benefitList">
      <div class="benefit-item">
        <div class="benefit-check">✓</div>
        <span class="benefit-text" id="b1">Mobile-friendly guide guests can open instantly</span>
      </div>
      <div class="benefit-item">
        <div class="benefit-check">✓</div>
        <span class="benefit-text" id="b2">Printable PDF for guests who prefer paper</span>
      </div>
      <div class="benefit-item">
        <div class="benefit-check">✓</div>
        <span class="benefit-text" id="b3">Available in English, Spanish &amp; French</span>
      </div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="cta-pill" id="cta">See it live →</div>
    <span class="site-url white">myguestguide.com</span>
  </div>
</div>

<script>
(function() {
  const data = window.POST_DATA || null;
  if (!data) {
    const params = new URLSearchParams(window.location.search);
    const postId = params.get('postId');
    if (postId) {
      fetch('../posts.json')
        .then(r => r.json())
        .then(posts => {
          const p = posts.find(x => x.id === postId);
          if (p) applyData(p);
        }).catch(() => {});
    }
    return;
  }
  applyData(data);

  function applyData(p) {
    if (p.title) document.getElementById('headline').textContent = p.title;
    if (p.cta) document.getElementById('cta').textContent = p.cta + ' →';
    if (p.benefits && Array.isArray(p.benefits)) {
      p.benefits.forEach((b, i) => {
        const el = document.getElementById(`b${i+1}`);
        if (el) el.textContent = b;
      });
    }
  }
})();
</script>
</body>
</html>
