<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGuest — Post Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ivory: #F7F3EE;
      --sand: #EFE7DD;
      --charcoal: #2B2B2B;
      --warm-gray: #7A746E;
      --taupe: #D8CEC2;
      --teal: #59C3C3;
      --deep-teal: #2D6A73;
      --coral: #F29B7F;
      --sidebar-w: 280px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--ivory);
      color: var(--charcoal);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: white;
      border-right: 1px solid var(--taupe);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--taupe);
    }

    .brand-logo {
      font-size: 18px;
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-logo::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
    }

    .sidebar-subtitle {
      font-size: 13px;
      color: var(--warm-gray);
    }

    .sidebar-filters {
      padding: 20px 20px 12px;
      border-bottom: 1px solid var(--taupe);
    }

    .filter-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--warm-gray);
      font-weight: 500;
      margin-bottom: 10px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      color: var(--charcoal);
      text-align: left;
      transition: background 0.15s;
    }

    .filter-btn:hover { background: var(--sand); }
    .filter-btn.active {
      background: #E8F7F7;
      color: var(--deep-teal);
      font-weight: 500;
    }

    .filter-count {
      font-size: 12px;
      color: var(--warm-gray);
      background: var(--sand);
      border-radius: 999px;
      padding: 2px 8px;
    }

    .filter-btn.active .filter-count {
      background: rgba(89,195,195,0.2);
      color: var(--deep-teal);
    }

    .sidebar-stats {
      padding: 16px 20px;
      margin-top: auto;
      border-top: 1px solid var(--taupe);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--warm-gray);
      margin-bottom: 6px;
    }

    .stat-row:last-child { margin-bottom: 0; }
    .stat-val { font-weight: 500; color: var(--charcoal); }

    /* Main content */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .main-header {
      position: sticky;
      top: 0;
      background: var(--ivory);
      border-bottom: 1px solid var(--taupe);
      padding: 20px 32px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .main-title {
      font-size: 20px;
      font-weight: 500;
      color: var(--charcoal);
    }

    .main-sub {
      font-size: 14px;
      color: var(--warm-gray);
    }

    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--sand);
      border-radius: 8px;
      padding: 4px;
    }

    .view-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 13px;
      color: var(--warm-gray);
      cursor: pointer;
      transition: all 0.15s;
    }

    .view-btn.active {
      background: white;
      color: var(--charcoal);
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* Grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
      padding: 32px;
    }

    /* Post card */
    .post-card {
      background: white;
      border-radius: 16px;
      border: 1px solid var(--taupe);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .post-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(43,43,43,0.1);
    }

    /* The iframe preview container */
    .card-preview {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
      background: var(--sand);
    }

    .card-preview iframe {
      width: 1080px;
      height: 1080px;
      border: none;
      transform-origin: top left;
      pointer-events: none;
    }

    .card-meta {
      padding: 16px 18px;
      border-top: 1px solid var(--taupe);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
    }

    .card-id {
      font-size: 11px;
      color: var(--warm-gray);
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 500;
      border-radius: 999px;
      padding: 3px 10px;
      flex-shrink: 0;
    }

    .status-badge.ready {
      background: #E8F7F7;
      color: var(--deep-teal);
    }

    .status-badge.draft {
      background: var(--sand);
      color: var(--warm-gray);
    }

    .status-badge.skip {
      background: #FDF0EA;
      color: #C96A4A;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--charcoal);
      line-height: 1.35;
      margin-bottom: 8px;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .template-tag {
      font-size: 11px;
      color: var(--warm-gray);
      background: var(--sand);
      border-radius: 999px;
      padding: 3px 10px;
      font-weight: 400;
    }

    .publish-date {
      font-size: 12px;
      color: var(--warm-gray);
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      color: var(--warm-gray);
      gap: 12px;
    }

    .empty-icon {
      font-size: 48px;
      opacity: 0.4;
    }

    .empty-text {
      font-size: 16px;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px;
      color: var(--warm-gray);
      font-size: 16px;
      gap: 12px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--taupe);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar styling */
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--taupe); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-logo">MyGuest Posts</div>
      <div class="sidebar-subtitle">Instagram Post Preview System</div>
    </div>

    <div class="sidebar-filters">
      <div class="filter-label">Filter by status</div>
      <div class="filter-group" id="statusFilters">
        <button class="filter-btn active" data-filter="status" data-value="all">
          All posts <span class="filter-count" id="countAll">—</span>
        </button>
        <button class="filter-btn" data-filter="status" data-value="ready">
          Ready <span class="filter-count" id="countReady">—</span>
        </button>
        <button class="filter-btn" data-filter="status" data-value="draft">
          Draft <span class="filter-count" id="countDraft">—</span>
        </button>
      </div>
    </div>

    <div class="sidebar-filters">
      <div class="filter-label">Filter by template</div>
      <div class="filter-group" id="templateFilters">
        <button class="filter-btn active" data-filter="template" data-value="all">
          All templates <span class="filter-count">—</span>
        </button>
      </div>
    </div>

    <div class="sidebar-stats" id="sidebarStats">
      <div class="stat-row">
        <span>Total posts</span>
        <span class="stat-val" id="statTotal">—</span>
      </div>
      <div class="stat-row">
        <span>Ready to export</span>
        <span class="stat-val" id="statReady">—</span>
      </div>
      <div class="stat-row">
        <span>In draft</span>
        <span class="stat-val" id="statDraft">—</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="main-header">
      <div>
        <div class="main-title" id="mainTitle">All posts</div>
        <div class="main-sub" id="mainSub">Loading...</div>
      </div>
    </div>

    <div class="posts-grid" id="postsGrid">
      <div class="loading">
        <div class="spinner"></div>
        Loading posts...
      </div>
    </div>
  </main>
</div>

<script>
const TEMPLATE_FILES = {
  'brand-intro': '01-brand-intro.html',
  'core-promise': '02-core-promise.html',
  'how-it-works': '03-how-it-works.html',
  'host-problem': '04-host-problem.html',
  'myguest-solution': '05-myguest-solution.html',
  'before-after': '06-before-after.html',
  'whats-included': '07-whats-included.html',
  'template-showcase': '08-template-showcase.html',
  'cta-launch-price': '09-cta-launch-price.html',
};

const TEMPLATE_LABELS = {
  'brand-intro': 'Brand Intro',
  'core-promise': 'Core Promise',
  'how-it-works': 'How It Works',
  'host-problem': 'Host Problem',
  'myguest-solution': 'Solution',
  'before-after': 'Before / After',
  'whats-included': "What's Included",
  'template-showcase': 'Showcase',
  'cta-launch-price': 'CTA / Price',
};

let allPosts = [];
let activeStatusFilter = 'all';
let activeTemplateFilter = 'all';

async function init() {
  try {
    const res = await fetch('../posts.json');
    allPosts = await res.json();
    setupFilters();
    updateStats();
    renderGrid();
  } catch (e) {
    document.getElementById('postsGrid').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠</div><div class="empty-text">Could not load posts.json. Make sure you're running the preview server (npm run preview).</div></div>`;
  }
}

function setupFilters() {
  // Status filter counts
  document.getElementById('countAll').textContent = allPosts.length;
  document.getElementById('countReady').textContent = allPosts.filter(p => p.status === 'ready').length;
  document.getElementById('countDraft').textContent = allPosts.filter(p => p.status === 'draft').length;
  document.getElementById('statTotal').textContent = allPosts.length;
  document.getElementById('statReady').textContent = allPosts.filter(p => p.status === 'ready').length;
  document.getElementById('statDraft').textContent = allPosts.filter(p => p.status === 'draft').length;

  // Status filter buttons
  document.getElementById('statusFilters').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter="status"]');
    if (!btn) return;
    activeStatusFilter = btn.dataset.value;
    document.querySelectorAll('[data-filter="status"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  });

  // Template filters
  const templates = [...new Set(allPosts.map(p => p.template))];
  const tfContainer = document.getElementById('templateFilters');
  templates.forEach(t => {
    const count = allPosts.filter(p => p.template === t).length;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.filter = 'template';
    btn.dataset.value = t;
    btn.innerHTML = `${TEMPLATE_LABELS[t] || t} <span class="filter-count">${count}</span>`;
    tfContainer.appendChild(btn);
  });

  tfContainer.addEventListener('click', e => {
    const btn = e.target.closest('[data-filter="template"]');
    if (!btn) return;
    activeTemplateFilter = btn.dataset.value;
    document.querySelectorAll('[data-filter="template"]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
  });
}

function updateStats() {
  document.getElementById('statTotal').textContent = allPosts.length;
  document.getElementById('statReady').textContent = allPosts.filter(p => p.status === 'ready').length;
  document.getElementById('statDraft').textContent = allPosts.filter(p => p.status === 'draft').length;
}

function getFilteredPosts() {
  return allPosts.filter(p => {
    const statusOk = activeStatusFilter === 'all' || p.status === activeStatusFilter;
    const templateOk = activeTemplateFilter === 'all' || p.template === activeTemplateFilter;
    return statusOk && templateOk;
  });
}

function renderGrid() {
  const posts = getFilteredPosts();
  const grid = document.getElementById('postsGrid');

  document.getElementById('mainSub').textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''} shown`;

  if (posts.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">◌</div>
      <div class="empty-text">No posts match the current filters.</div>
    </div>`;
    return;
  }

  grid.innerHTML = '';
  posts.forEach(post => {
    const card = buildCard(post);
    grid.appendChild(card);
  });

  // Scale iframes to fit cards after render
  requestAnimationFrame(() => {
    document.querySelectorAll('.card-preview').forEach(container => {
      const iframe = container.querySelector('iframe');
      if (!iframe) return;
      const containerW = container.offsetWidth;
      const scale = containerW / 1080;
      iframe.style.transform = `scale(${scale})`;
      container.style.height = (1080 * scale) + 'px';
    });
  });
}

function buildCard(post) {
  const templateFile = TEMPLATE_FILES[post.template] || '01-brand-intro.html';
  const templateUrl = `../templates/${templateFile}?postId=${post.id}`;

  const card = document.createElement('div');
  card.className = 'post-card';
  card.innerHTML = `
    <div class="card-preview">
      <iframe src="${templateUrl}" scrolling="no" loading="lazy"></iframe>
    </div>
    <div class="card-meta">
      <div class="card-top">
        <span class="card-id">${post.id}</span>
        <span class="status-badge ${post.status}">${post.status}</span>
      </div>
      <div class="card-title">${escHtml(post.title)}</div>
      <div class="card-bottom">
        <span class="template-tag">${TEMPLATE_LABELS[post.template] || post.template}${post.style ? ' · ' + cap(post.style) : ''}</span>
        <span class="publish-date">${formatDate(post.publish_date)}</span>
      </div>
    </div>
  `;

  card.addEventListener('click', () => {
    window.open(templateUrl, '_blank');
  });

  return card;
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cap(str) {
  return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch { return dateStr; }
}

init();
</script>
</body>
</html>
