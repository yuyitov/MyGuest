<!DOCTYPE html>
<html lang="{{HTML_LANG}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuest Print — {{VILLA_NAME}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @page {
            size: letter;
            margin: 1.2cm;
        }

        :root {
            --primary: {{COLOR_PRIMARY}};
            --accent: {{COLOR_ACCENT}};
            --bg: #ffffff;
            --text: {{COLOR_TEXT}};
            --border: rgba(0,0,0,0.10);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: white;
            margin: 0;
            font-size: 11pt;
            line-height: 1.55;
        }

        .page {
            width: 100%;
        }

        .header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
        }

        .eyebrow {
            font-size: 10pt;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28pt;
            line-height: 1;
            color: var(--primary);
            margin: 0 0 8px 0;
        }

        .subtext {
            font-size: 11pt;
            color: #555;
        }

        .language-line {
            margin-top: 10px;
            font-size: 10pt;
            color: #666;
        }

        .section {
            margin-bottom: 18px;
            page-break-inside: avoid;
        }

        .section-title {
            font-size: 10pt;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent);
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .paragraph {
            margin: 0 0 8px 0;
            white-space: pre-line;
        }

        .info-row {
            margin: 0 0 8px 0;
        }

        .info-label {
            font-weight: 700;
        }

        .footer {
            margin-top: 28px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 9.5pt;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="eyebrow">{{EYEBROW}}</div>
            <h1>{{VILLA_NAME}}</h1>
            <div class="subtext">{{PROPERTY_ADDRESS}}</div>
            <div class="language-line">{{PRIMARY_LANGUAGE_LABEL}}: {{PRIMARY_LANGUAGE}}</div>
        </header>

        {{CONTENT_SECTIONS}}

        <div class="footer">
            {{FOOTER_TEXT}}
        </div>
    </div>
</body>
</html>
