<!DOCTYPE html>
<html lang="{{HTML_LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyGuest — {{VILLA_NAME}}</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@400;500;700;900&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
@page { size: letter; margin: 0; }

:root {
  --primary: {{COLOR_PRIMARY}};
  --accent: {{COLOR_ACCENT}};
  --text: {{COLOR_TEXT}};
  --dark: {{COLOR_DARK}};
  --muted: #888;
  --border: #e0d8ce;
  --cream: #f8f5f0;
  --page-h: 27.94cm;
  --page-w: 21.59cm;
  --pad: 1.6cm;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: white;
  font-size: 12.5pt;
  line-height: 1.65;
}

/* ═══════════════════════════════════════
   BASE PAGE
═══════════════════════════════════════ */
.book-page {
  width: var(--page-w);
  min-height: var(--page-h);
  overflow: hidden;
  page-break-after: always;
  position: relative;
}

/* ═══════════════════════════════════════
   PAGE 1 — COVER
═══════════════════════════════════════ */
.cover-pg {
  display: flex;
  flex-direction: column;
}

.cover-photo {
  width: 100%;
  height: 16cm;
  object-fit: cover;
  display: block;
}

.cover-body {
  flex: 1;
  padding: 1cm var(--pad) 1.4cm;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.cover-eyebrow {
  font-size: 9.5pt;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.6cm;
}

.cover-welcome {
  font-family: 'DM Sans', sans-serif;
  font-size: 66pt;
  font-weight: 900;
  line-height: 0.86;
  color: var(--dark);
  text-transform: uppercase;
  letter-spacing: -2px;
  margin-bottom: 0.2cm;
}

.cover-script {
  display: block;
  font-family: 'Great Vibes', cursive;
  font-size: 28pt;
  color: var(--primary);
  line-height: 1.1;
  margin-bottom: 0.1cm;
}

.cover-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 21pt;
  font-weight: 600;
  color: var(--dark);
  letter-spacing: 0.3px;
}

.cover-rule {
  width: 36px;
  height: 2px;
  background: var(--primary);
  margin: 0.35cm 0 0.3cm;
}

.cover-address {
  font-size: 10pt;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ═══════════════════════════════════════
   COVER VARIANTS
═══════════════════════════════════════ */
.cover-alt-pg { display: block; }

/* Coastal: full-bleed photo + bottom gradient + text overlay */
.cover-coastal { position: relative; width: 100%; height: var(--page-h); overflow: hidden; }
.cover-coastal-photo { position: absolute; top: 0; right: 0; bottom: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.cover-coastal-body {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 2.5cm var(--pad) 1.4cm;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.65) 40%, rgba(0,0,0,0.35) 70%, rgba(0,0,0,0.12) 100%);
}
.cover-coastal .cover-eyebrow { color: rgba(255,255,255,0.9); text-shadow: 0 1px 6px rgba(0,0,0,0.9); }
.cover-coastal .cover-welcome { color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.65); }
.cover-coastal .cover-script { color: var(--accent); text-shadow: 0 1px 6px rgba(0,0,0,0.65); }
.cover-coastal .cover-name { color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.65); }
.cover-coastal .cover-address { color: rgba(255,255,255,0.85); text-shadow: 0 1px 5px rgba(0,0,0,0.8); }
.cover-coastal .cover-rule { background: var(--accent); }

/* Classic: dark left panel + editorial photo right */
.cover-classic { display: table; width: 100%; height: var(--page-h); border-collapse: collapse; }
.cover-classic-left {
  display: table-cell; width: 52%; height: var(--page-h);
  background: var(--dark);
  padding: 1.6cm var(--pad);
  vertical-align: bottom;
}
.cover-classic-right { display: table-cell; width: 48%; padding: 0; vertical-align: top; }
.cover-classic-right img { width: 100%; height: var(--page-h); object-fit: cover; display: block; }
.cover-classic-left .cover-eyebrow { color: rgba(255,255,255,0.35); }
.cover-classic-left .cover-welcome { color: #fff; }
.cover-classic-left .cover-script { color: var(--accent); }
.cover-classic-left .cover-name { color: rgba(255,255,255,0.9); }
.cover-classic-left .cover-address { color: rgba(255,255,255,0.35); }
.cover-classic-left .cover-rule { background: var(--accent); }

/* Sunset: full-bleed photo + warm tinted overlay + centered text */
.cover-sunset { position: relative; width: 100%; height: var(--page-h); overflow: hidden; }
.cover-sunset-photo { position: absolute; top: 0; right: 0; bottom: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.cover-sunset-overlay {
  position: absolute; top: 0; right: 0; bottom: 0; left: 0;
  background: linear-gradient(160deg, rgba(231,111,81,0.62) 0%, rgba(38,70,83,0.75) 100%);
}
.cover-sunset-body {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 2cm var(--pad) 1.6cm; text-align: center;
}
.cover-sunset .cover-eyebrow { color: rgba(255,255,255,0.9); text-shadow: 0 1px 6px rgba(0,0,0,0.7); }
.cover-sunset .cover-welcome { color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
.cover-sunset .cover-script { color: var(--accent); text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
.cover-sunset .cover-name { color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.5); }
.cover-sunset .cover-address { color: rgba(255,255,255,0.9); text-shadow: 0 1px 5px rgba(0,0,0,0.6); }
.cover-sunset .cover-rule { background: var(--accent); margin-left: auto; margin-right: auto; }

/* ═══════════════════════════════════════
   SHARED — SPLIT TABLE LAYOUT
═══════════════════════════════════════ */
.split-layout {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

/* ═══════════════════════════════════════
   PAGE 2 — WELCOME
═══════════════════════════════════════ */
.split-left-cell {
  width: 46%;
  padding: 0;
  vertical-align: top;
}

.split-right-cell {
  width: 54%;
  padding: var(--pad) 1.4cm var(--pad) 1cm;
  vertical-align: top;
}

.welcome-img-wrap {
  position: relative;
  width: 100%;
  height: var(--page-h);
  overflow: hidden;
}

.welcome-photo {
  width: 100%;
  height: var(--page-h);
  min-height: 20cm;
  object-fit: cover;
  object-position: center;
  display: block;
}

.welcome-overlay-script {
  position: absolute;
  bottom: 1cm;
  left: 0.4cm;
  font-family: 'Great Vibes', cursive;
  font-size: 44pt;
  color: rgba(255,255,255,0.92);
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  line-height: 1;
}

.amenity-chips {
  margin-top: 0.5cm;
}

.amenity-chip {
  display: inline-block;
  padding: 4px 11px;
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 10.5pt;
  margin: 2px 3px 2px 0;
  color: var(--text);
  background: var(--cream);
}

/* ═══════════════════════════════════════
   PAGE 3 — ARRIVAL
═══════════════════════════════════════ */
.arrival-layout { height: var(--page-h); }

.arrival-content-cell {
  width: 56%;
  padding: var(--pad) 1cm var(--pad) var(--pad);
  vertical-align: top;
}

.arrival-image-cell {
  width: 44%;
  padding: 0;
  vertical-align: top;
}

.side-photo {
  width: 100%;
  height: var(--page-h);
  min-height: 20cm;
  object-fit: cover;
  object-position: center;
  display: block;
}

.time-grid {
  width: 100%;
  border-collapse: separate;
  border-spacing: 10px 0;
  margin: 0.7cm 0;
}

.time-card {
  width: 50%;
  background: var(--cream);
  border-radius: 10px;
  padding: 0.55cm 0.4cm;
  text-align: center;
  vertical-align: top;
  border: 1px solid var(--border);
}

.time-spacer { width: 0; }

.time-label {
  display: block;
  font-size: 9.5pt;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 6px;
}

.time-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34pt;
  color: var(--dark);
  line-height: 1;
}

.info-block {
  margin-bottom: 0.45cm;
}

.info-block-label {
  font-size: 9.5pt;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 4px;
}

.info-block-text {
  font-size: 12.5pt;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-line;
}

.maps-btn {
  display: inline-block;
  margin-top: 0.3cm;
  padding: 7px 16px;
  border: 1.5px solid var(--primary);
  border-radius: 3px;
  font-size: 10pt;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--primary);
  text-decoration: none;
}

/* ═══════════════════════════════════════
   PAGE 4 — HOUSE / THINGS TO KNOW
═══════════════════════════════════════ */
.house-layout { height: var(--page-h); }

.house-left-cell {
  width: 46%;
  padding: var(--pad) 0.9cm var(--pad) var(--pad);
  vertical-align: top;
  border-right: 1px solid var(--border);
}

.house-right-cell {
  width: 54%;
  padding: var(--pad) var(--pad) var(--pad) 1cm;
  vertical-align: top;
}

.house-photo {
  width: 100%;
  height: 7cm;
  object-fit: cover;
  border-radius: 6px;
  display: block;
  margin: 0.5cm 0;
}

.amenities-list {
  margin-top: 0.3cm;
}

.amenity-row {
  padding: 4px 0;
  font-size: 12.5pt;
  border-bottom: 1px solid var(--border);
}

.amenity-row::before {
  content: "· ";
  color: var(--primary);
  font-weight: 700;
}

.know-table {
  margin-top: 0.2cm;
}

.know-row {
  display: block;
  padding: 0.3cm 0;
  border-bottom: 1px solid var(--border);
}

.know-label {
  display: block;
  font-size: 9.5pt;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--dark);
  margin-bottom: 3px;
}

.know-text {
  display: block;
  font-size: 12pt;
  color: #555;
  line-height: 1.45;
}

.know-label-full {
  display: block;
  font-size: 12.5pt;
  color: var(--text);
  padding: 2px 0;
}

.know-label-full::before {
  content: "— ";
  color: var(--primary);
}

/* ═══════════════════════════════════════
   PAGE 5 — HOUSE RULES
═══════════════════════════════════════ */
.rules-pg { padding: 0; }

.rules-header-layout {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  height: 6cm;
}

.rules-heading-cell {
  width: 55%;
  padding: var(--pad) 1cm var(--pad) var(--pad);
  vertical-align: middle;
}

.rules-image-cell {
  width: 45%;
  padding: 0;
  vertical-align: top;
}

.rules-image-cell img {
  width: 100%;
  height: 6cm;
  object-fit: cover;
  display: block;
}

.rules-grid {
  width: 100%;
  border-collapse: collapse;
  padding: 0 var(--pad);
}

.rule-card {
  width: 33.33%;
  padding: 0.5cm 0.4cm;
  vertical-align: top;
  border: 1px solid var(--border);
  background: white;
}

.rule-empty { background: var(--cream); }

.rule-num {
  font-family: 'DM Sans', sans-serif;
  font-size: 20pt;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 4px;
  opacity: 0.7;
}

.rule-title {
  font-size: 10.5pt;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--dark);
  margin-bottom: 5px;
  line-height: 1.2;
}

.rule-desc {
  font-size: 11pt;
  color: #666;
  line-height: 1.5;
}

.before-section {
  margin: 0.5cm var(--pad) 0;
  padding-top: 0.4cm;
  border-top: 1px solid var(--border);
}

.before-title {
  font-size: 10pt;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 0.25cm;
}

.checklist-item {
  font-size: 12.5pt;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.checklist-item::before {
  content: "☐  ";
  color: var(--primary);
}

/* ═══════════════════════════════════════
   PAGE 6 — RECOMMENDATIONS
═══════════════════════════════════════ */
.recs-pg { padding: var(--pad); }

.recs-page-header { margin-bottom: 0.5cm; }

.recs-main-title { font-size: 28pt !important; }

.recs-layout {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
}

.recs-col {
  width: 48%;
  vertical-align: top;
  padding-right: 0.4cm;
}

.recs-col:last-child {
  padding-right: 0;
  padding-left: 0.4cm;
}

.recs-divider {
  width: 4%;
  border-left: 1px solid var(--border);
}

.rec-block { margin-bottom: 0.6cm; }

.rec-heading {
  margin-bottom: 0.2cm;
  line-height: 1;
}

.rec-script {
  font-family: 'Great Vibes', cursive;
  font-size: 18pt;
  color: var(--primary);
  display: block;
  line-height: 1;
}

.rec-bold {
  font-family: 'DM Sans', sans-serif;
  font-size: 12pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--dark);
}

.rec-list { margin-top: 0.15cm; }

.rec-item {
  padding: 0.22cm 0;
  border-bottom: 1px solid var(--border);
}

.rec-item:last-child { border-bottom: none; }

.rec-name {
  font-size: 12.5pt;
  font-weight: 700;
  color: var(--dark);
}

.rec-link {
  font-size: 9.5pt;
  color: var(--primary);
  margin-left: 6px;
  text-decoration: none;
  border: 1px solid var(--primary);
  padding: 1px 5px;
  border-radius: 2px;
}

.rec-detail {
  font-size: 11.5pt;
  color: #666;
  margin-top: 2px;
  line-height: 1.4;
}

/* ═══════════════════════════════════════
   PAGE 7 — THANK YOU / CONTACT
═══════════════════════════════════════ */
.thanks-pg {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: var(--page-h);
  background: var(--cream);
}

.thanks-center {
  text-align: center;
  padding: 1.5cm var(--pad);
  max-width: 14cm;
  margin: 0 auto;
}

.thanks-script {
  display: block;
  font-family: 'Great Vibes', cursive;
  font-size: 60pt;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 0.2cm;
}

.thanks-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 15.5pt;
  color: #666;
  margin-bottom: 0.8cm;
}

.contact-rows {
  margin-bottom: 0.6cm;
  text-align: left;
  display: inline-block;
  min-width: 10cm;
}

.contact-row {
  padding: 0.24cm 0;
  border-bottom: 1px solid var(--border);
  font-size: 12.5pt;
  overflow: hidden;
}

.contact-label {
  font-size: 9.5pt;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--primary);
  display: inline-block;
  width: 110px;
  vertical-align: top;
  padding-top: 2px;
}

.contact-val { color: var(--text); }

.review-btn {
  display: inline-block;
  margin: 0.3cm 0 0.6cm;
  padding: 0.32cm 0.7cm;
  background: var(--dark);
  color: white;
  font-size: 10.5pt;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  border-radius: 3px;
}

.footer-note {
  font-size: 9.5pt;
  color: #aaa;
  margin-top: 0.5cm;
  line-height: 1.5;
}

.footer-brand {
  font-size: 9pt;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #ccc;
  margin-top: 6px;
}

/* ═══════════════════════════════════════
   SHARED TYPOGRAPHY
═══════════════════════════════════════ */
.page-heading { margin-bottom: 0.6cm; }

.page-script {
  display: block;
  font-family: 'Great Vibes', cursive;
  font-size: 24pt;
  color: var(--primary);
  line-height: 1;
  margin-bottom: 2px;
}

.page-bold {
  font-family: 'DM Sans', sans-serif;
  font-size: 26pt;
  font-weight: 900;
  text-transform: uppercase;
  color: var(--dark);
  line-height: 0.9;
  letter-spacing: -0.5px;
}

.page-text {
  font-size: 12.5pt;
  line-height: 1.65;
  color: var(--text);
  white-space: pre-line;
  margin-bottom: 0.35cm;
}

.hosts-block {
  color: #555;
  border-top: 1px solid var(--border);
  padding-top: 0.3cm;
  margin-top: 0.2cm;
}

/* ═══════════════════════════════════════
   SCREEN-ONLY
═══════════════════════════════════════ */
@media screen {
  body { background: #e8e4de; padding: 20px; }
  .book-page { box-shadow: 0 8px 32px rgba(0,0,0,0.18); margin: 0 auto 28px; }
}

@media print {
  body { background: white; padding: 0; }
  .book-page { margin: 0; box-shadow: none; }
}
</style>
</head>
<body>
{{PAGES_CONTENT}}
</body>
</html>
