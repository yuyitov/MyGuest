<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuest Print — dsvsdgv</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @page {
            size: letter;
            margin: 1.2cm;
        }

        :root {
            --primary: #8B6F47;
            --accent: #D9CEBA;
            --bg: #ffffff;
            --text: #2E2218;
            --border: rgba(0,0,0,0.10);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: white;
            margin: 0;
            font-size: 11pt;
            line-height: 1.55;
        }

        .page {
            width: 100%;
        }

        .header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
            margin-bottom: 20px;
        }

        .eyebrow {
            font-size: 10pt;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28pt;
            line-height: 1;
            color: var(--primary);
            margin: 0 0 8px 0;
        }

        .subtext {
            font-size: 11pt;
            color: #555;
        }

        .language-line {
            margin-top: 10px;
            font-size: 10pt;
            color: #666;
        }

        .section {
            margin-bottom: 18px;
            page-break-inside: avoid;
        }

        .section-title {
            font-size: 10pt;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--accent);
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .paragraph {
            margin: 0 0 8px 0;
            white-space: pre-line;
        }

        .info-row {
            margin: 0 0 8px 0;
        }

        .info-label {
            font-weight: 700;
        }

        .footer {
            margin-top: 28px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 9.5pt;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="eyebrow">BIENVENIDO</div>
            <h1>dsvsdgv</h1>
            <div class="subtext">dfvsdg</div>
            <div class="language-line">Idioma principal: Español</div>
        </header>

        <section class="section"><h2 class="section-title">Llegada</h2><div class="info-row"><span class="info-label">Check-in:</span> 3</div><div class="info-row"><span class="info-label">Check-out:</span> 11</div><p class="paragraph">fvfdb</p><p class="paragraph">&lt;dfb</p></section>
<section class="section"><h2 class="section-title">Sobre la estancia</h2><p class="paragraph">fdbfb</p><div class="info-row"><span class="info-label">Pet friendly:</span> Sí</div><p class="paragraph">&lt;dfb</p></section>
<section class="section"><h2 class="section-title">Información de la casa</h2><p class="paragraph">&lt;dfb</p><p class="paragraph">&lt;fdb</p><p class="paragraph">&lt;fb</p></section>

        <div class="footer">
            Public guest version only. Private access details are intentionally excluded.
        </div>
    </div>
</body>
</html>
