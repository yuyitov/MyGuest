<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyGuest — Villa Test 9 MyGuest</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E76F51;
            --accent: #E9C46A;
            --bg: #FFF5F2;
            --text: #264653;
            --card: #ffffff;
            --border: rgba(0,0,0,0.08);
            --muted: rgba(0,0,0,0.55);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        .app-container {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 20px 20px 28px;
            background: var(--bg);
        }

        .language-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .language-chip {
            border: 1px solid var(--border);
            background: white;
            color: var(--text);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .language-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .hero {
            background: linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,255,255,0.92));
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 18px;
        }

        .eyebrow {
            letter-spacing: 2px;
            font-size: 12px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            color: var(--primary);
            line-height: 0.98;
            margin-bottom: 12px;
        }

        .subtext {
            font-size: 14px;
            line-height: 1.6;
            color: var(--muted);
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 22px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .section-title {
            font-size: 13px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 14px;
            font-weight: 700;
        }

        .paragraph {
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 12px;
            white-space: pre-line;
        }

        .info-row {
            margin-bottom: 12px;
        }

        .info-label {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
        }

        .btn {
            display: block;
            background: var(--primary);
            color: white !important;
            text-align: center;
            padding: 16px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 12px;
        }

        .footer-note {
            margin-top: 12px;
            font-size: 12px;
            line-height: 1.5;
            text-align: center;
            color: var(--muted);
        }

        @media print {
            @page { size: letter; margin: 1cm; }
            body { background: white; }
            .app-container { max-width: 100% !important; padding: 0; }
            .language-bar { display: none; }
            .hero, .card {
                box-shadow: none;
                border: 1px solid #e5e5e5;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="language-bar" aria-label="Language selector">
            <div class="language-chip active">English</div>
<div class="language-chip">Español</div>
<div class="language-chip">Français</div>
        </div>

        <header class="hero">
            <p class="eyebrow">WELCOME</p>
            <h1>Villa Test 9 MyGuest</h1>
            <p class="subtext">123 Ocean Drive, Puerto Vallarta, Mexico</p>
        </header>

        
        <section class="card">
            <h2 class="section-title">Arrival</h2>
            
        <div class="info-row">
            <div class="info-label">Check-in</div>
            <div class="info-value">3:00 PM</div>
        </div>
    
        <div class="info-row">
            <div class="info-label">Check-out</div>
            <div class="info-value">11:00 AM</div>
        </div>
    <p class="paragraph">test</p><p class="paragraph">test</p>
        </section>
    

        <section class="card">
            <h2 class="section-title">About the stay</h2>
            
        <div class="info-row">
            <div class="info-label">Pet friendly</div>
            <div class="info-value">Yes</div>
        </div>
    
        </section>
    

        <p class="footer-note">
            This welcome book shows public guest information only.
        </p>
    </div>
</body>
</html>
