name: Deploy MyGuest Pages

on:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["MyGuest Generator"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Worker (send delivery email)
        if: success()
        env:
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
          WORKER_URL: ${{ vars.WORKER_URL }}
        run: |
          SLUG=$(git log -1 --pretty=%s | sed -n 's/^Generate villa page for //p')

          if [ -z "${SLUG}" ]; then
            echo "Commit is not a generator commit — skipping notify"
            exit 0
          fi

          if [ -z "${WORKER_URL}" ]; then
            echo "Error: WORKER_URL not configured for generator commit" >&2
            exit 1
          fi

          if [ -z "${NOTIFY_SECRET}" ]; then
            echo "Error: NOTIFY_SECRET not configured for generator commit" >&2
            exit 1
          fi

          echo "Notifying Worker for slug: ${SLUG}"
          curl --fail-with-body --silent --show-error --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${NOTIFY_SECRET}" \
            -d "{\"slug\":\"${SLUG}\"}" \
            "${WORKER_URL}/notify"
