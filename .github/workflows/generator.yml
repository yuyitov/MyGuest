name: MyGuest Generator

on:
  repository_dispatch:
    types: [new-villa]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install print dependencies
        run: |
          python -m pip install --upgrade pip
          pip install weasyprint

      - name: Trace dispatch payload
        run: |
          echo "submission_id=${{ github.event.client_payload.metadata.submission_id }}"
          echo "slug=${{ github.event.client_payload.metadata.slug }}"
          echo "source=${{ github.event.client_payload.metadata.source }}"
          echo "payload_blocks=metadata,property,outputs,ingest_inputs,content"

      - name: Validate public payload shape
        env:
          PUBLIC_PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["PUBLIC_PAYLOAD_JSON"])

          required_blocks = {"metadata", "property", "outputs", "ingest_inputs", "content"}
          missing = sorted(required_blocks - set(payload.keys()))
          if missing:
              print(f"Missing required payload blocks: {missing}")
              sys.exit(1)

          forbidden_keys = {
              "wifi_ssid",
              "wifi_password",
              "door_code",
              "host_phone",
              "house_access_private",
          }

          def find_forbidden(obj, path="root"):
              hits = []

              if isinstance(obj, dict):
                  for key, value in obj.items():
                      if key in forbidden_keys:
                          hits.append(f"{path}.{key}")
                      hits.extend(find_forbidden(value, f"{path}.{key}"))
              elif isinstance(obj, list):
                  for i, item in enumerate(obj):
                      hits.extend(find_forbidden(item, f"{path}[{i}]"))

              return hits

          forbidden_hits = find_forbidden(payload)
          if forbidden_hits:
              print("Private fields found in public payload:")
              for hit in forbidden_hits:
                  print(f" - {hit}")
              sys.exit(1)

          print("Public payload shape validated successfully.")
          PY

       - name: Generate Villa Page
        env:
          PUBLIC_PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_TRANSLATION: ${{ vars.OPENAI_MODEL_TRANSLATION }}
        run: |
          python scripts/generate_villa.py "$PUBLIC_PAYLOAD_JSON"
          
      - name: Postprocess Public Book Visual QA
        env:
          PUBLIC_PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          python scripts/postprocess_public_book.py "$PUBLIC_PAYLOAD_JSON"

      - name: Build Print PDF
        env:
          PUBLIC_PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          python scripts/build_print_pdf.py "$PUBLIC_PAYLOAD_JSON"

      - name: QA public outputs for private data
        run: |
          python - <<'PY'
          import os
          import sys

          forbidden_terms = [
              "guest_access_pin",
              "private_record_key",
              "priv-"
          ]

          public_root = "public"

          hits = []

          for root, dirs, files in os.walk(public_root):
              for filename in files:
                  path = os.path.join(root, filename)

                  if filename.lower().endswith((".png", ".jpg", ".jpeg", ".webp", ".gif", ".ico", ".pdf")):
                      continue

                  try:
                      with open(path, "r", encoding="utf-8", errors="ignore") as f:
                          content = f.read()
                  except Exception:
                      continue

                  for term in forbidden_terms:
                      if term in content:
                          hits.append((path, term))

          if hits:
              print("Private/sensitive terms found in public outputs:")
              for path, term in hits:
                  print(f"- {path}: {term}")
              sys.exit(1)

          print("QA OK: no private/sensitive terms found in public text outputs.")
          PY

      - name: Commit and Push
        run: |
          git config --global user.name "MyGuest Bot"
          git config --global user.email "actions@github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Generate villa page for ${{ github.event.client_payload.metadata.slug }}"
          git push
